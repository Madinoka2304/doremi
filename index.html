<!DOCTYPE html> 
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Do Re Mi — Плеер меню</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Archivo:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#120E17;
    --surface:#1C1522;
    --surface-2:#241A2C;
    --text:#F4EEDD;
    --muted:#93889F;
    --gold:#E8B34D;
    --sage:#8C9B78;
    --line:#33283D;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{ height:100%; overflow:hidden; }
  body{
    background:var(--bg); color:var(--text);
    font-family:'Archivo',sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  button{ font-family:inherit; cursor:pointer; }

  /* ---------- TOP BAR ---------- */
  header.top{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; flex-direction:column;
    padding:14px 16px 10px;
    background:linear-gradient(180deg, rgba(18,14,23,0.92), transparent);
  }
  .brand-row{ display:flex; align-items:center; justify-content:space-between; }
  .brand-row .brand-left{ display:flex; align-items:center; gap:10px; }
  .brand{ font-family:'Instrument Serif',serif; font-style:italic; font-size:28px; }
  .search-btn{
    width:32px; height:32px; border-radius:50%;
    background:var(--surface-2); border:1px solid var(--line); color:var(--muted);
    display:flex; align-items:center; justify-content:center;
  }
  .search-btn.active{ color:var(--gold); border-color:var(--gold); }
  .track-pos{
    font-family:'JetBrains Mono',monospace; font-size:15px; color:var(--muted); letter-spacing:1.5px;
  }
  .search-wrap{
    max-height:0; overflow:hidden; transition:max-height .3s ease;
  }
  .search-wrap.open{ max-height:52px; margin-top:10px; }
  .search-wrap input{
    width:100%; background:var(--surface-2); border:1px solid var(--line);
    border-radius:12px; padding:10px 14px; color:var(--text);
    font-family:'Archivo',sans-serif; font-size:14px; outline:none;
  }
  .search-wrap input::placeholder{ color:var(--muted); }

  .search-results-overlay{
    position:fixed; inset:0; z-index:55;
    background:rgba(10,8,13,0.94); backdrop-filter:blur(6px);
    padding:130px 20px 30px; overflow-y:auto;
    opacity:0; pointer-events:none; transition:opacity .25s ease;
  }
  .search-results-overlay.open{ opacity:1; pointer-events:auto; }
  .search-hit{
    display:flex; align-items:center; justify-content:space-between; gap:12px;
    padding:14px 4px; border-bottom:1px solid var(--line);
  }
  .search-hit .shn{ font-size:14px; }
  .search-hit .shc{ font-size:10px; color:var(--sage); text-transform:uppercase; letter-spacing:1px; display:block; margin-bottom:2px; }
  .search-hit .shp{ font-family:'JetBrains Mono',monospace; color:var(--gold); font-size:13px; flex-shrink:0; }
  .search-empty{ text-align:center; color:var(--muted); padding:40px 0; font-size:13px; }
  .cat-tabs{
    position:fixed; top:64px; left:0; right:0; z-index:50;
    display:flex; gap:8px; overflow-x:auto; padding:0 16px 9px;
    scrollbar-width:none;
    background:linear-gradient(180deg, rgba(18,14,23,0.75), transparent);
  }
  .cat-tabs::-webkit-scrollbar{ display:none; }
  .cat-tabs button{
    flex:0 0 auto; font-family:'JetBrains Mono',monospace; font-size:15px;
    letter-spacing:0.5px; color:var(--muted);
    background:rgba(36,26,44,0.8); border:1px solid var(--line);
    padding:8px 14px; border-radius:999px; white-space:nowrap;
    transition:all .25s ease;
  }
  .cat-tabs button.active{ color:var(--bg); background:var(--gold); border-color:var(--gold); }

  /* ---------- APP LAYOUT ---------- */
  .app{ position:fixed; inset:0; display:flex; }

  /* rotating disc layer, sits BEHIND text panel, bleeds off screen edges */
  .disc-stage{ position:fixed; inset:0; z-index:1; overflow:hidden; }
  .vinyl-wrap{
    position:absolute; left:58%; top:50%;
    width:min(108vh, 140vw); height:min(108vh, 140vw);
    transform:translate(-50%,-50%);
  }
  .vinyl{
    width:100%; height:100%; border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 40px 90px -20px rgba(0,0,0,0.85);
    animation:spin 16s linear infinite;
    animation-play-state:paused;
    position:relative;
    overflow:hidden;
  }
  .vinyl.active{ animation-play-state:running; }
  .vinyl.playing{ animation-duration:5s; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .vinyl .texture{
    position:absolute; inset:0;
    background:
      radial-gradient(circle at 30% 26%, rgba(255,255,255,0.30), transparent 45%),
      radial-gradient(circle at 70% 72%, rgba(0,0,0,0.30), transparent 55%);
  }
  .vinyl .ring{
    position:absolute; inset:6%; border-radius:50%;
    border:1px solid rgba(255,255,255,0.06);
  }
  .vinyl .center-dot{
    position:absolute; width:5%; height:5%; border-radius:50%;
    background:var(--bg); z-index:3;
  }

  /* white plate — sits STATIC on top of the vinyl, does NOT rotate */
  .static-plate{
    position:absolute; left:50%; top:50%; transform:translate(-50%,-50%);
    width:56%; height:56%; border-radius:50%;
    background:#F4F1EA;
    z-index:5;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 14px 30px rgba(0,0,0,0.4), inset 0 0 0 1px rgba(0,0,0,0.06);
  }
  .static-plate .icon{
    font-size:min(11vh, 13vw);
    transition:opacity .3s ease;
  }
  .static-plate img{
    width:100%; height:100%; border-radius:50%; object-fit:cover;
    position:absolute; inset:0;
    opacity:0; transition:opacity .45s ease;
    pointer-events:none;
  }
  .static-plate.has-photo .icon{ opacity:0; }
  .static-plate.has-photo img{ opacity:1; }
  .static-plate.loading{ animation:platePulse 1.1s ease-in-out infinite; }
  @keyframes platePulse{ 0%,100%{ opacity:1; } 50%{ opacity:0.55; } }

  .plate-spin{
    width:100%; height:100%;
    display:flex; align-items:center; justify-content:center;
    transform:rotate(0deg);
    transition:transform .6s cubic-bezier(.25,.8,.3,1);
  }
  .plate-spin.spinning{
    animation:spin 6s linear infinite;
    transition:none;
  }

  /* for elongated/boat-shaped plates — let the plate's own edges bleed past the circular frame instead of being cropped by it */
  .static-plate.no-crop{
    background:transparent; box-shadow:none; overflow:visible;
  }
  .static-plate.no-crop img{
    position:absolute; left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:175%; max-width:none; height:auto;
    border-radius:0; object-fit:contain;
  }

  /* ---------- TONEARM (anchored to the disc itself, scales with it) ---------- */
  .tonearm{
    position:absolute; top:4%; right:2%;
    width:38%; height:38%;
    transform-origin:84% 14%;
    transform:rotate(-32deg);
    transition:transform .5s cubic-bezier(.3,.8,.3,1.1);
    z-index:15; pointer-events:none;
  }
  .tonearm.playing{ transform:rotate(6deg); }
  .tonearm svg{ width:100%; height:100%; display:block; overflow:visible; }

  /* ---------- TEXT PANEL (left, opaque, scrollable list) ---------- */
  .text-panel{
    position:relative; z-index:10;
    width:60%; max-width:400px;
    background:var(--surface);
    border-right:1px solid var(--line);
    box-shadow:14px 0 40px -18px rgba(0,0,0,0.55);
    display:flex; flex-direction:column;
    padding-top:114px; padding-bottom:88px;
    transition:transform .42s cubic-bezier(.3,.8,.35,1);
  }
  .text-panel.collapsed{
    transform:translateX(-100%);
  }

  .panel-toggle{
    position:fixed; left:8px; top:50%; transform:translateY(-50%);
    z-index:60;
    width:30px; height:56px; border-radius:0 14px 14px 0;
    background:var(--surface-2); border:1px solid var(--line); border-left:none;
    color:var(--text); font-size:15px;
    display:flex; align-items:center; justify-content:center;
    box-shadow:4px 0 14px -6px rgba(0,0,0,0.5);
  }

  .list-scroll{
    flex:1; overflow-y:auto; padding:20vh 18px;
  }
  .list-scroll::-webkit-scrollbar{ display:none; }

  .cat-divider{
    font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:1.5px;
    color:var(--sage); text-transform:uppercase;
    padding:18px 0 8px;
  }
  .cat-divider:first-child{ padding-top:4px; }

  .list-item{
    padding:12px 0;
    border-bottom:1px solid var(--line);
    cursor:pointer;
  }
  .row-compact{
    display:flex; align-items:baseline; justify-content:space-between; gap:10px;
  }
  .li-name{
    font-family:'Instrument Serif',serif; font-style:italic;
    font-size:17px; line-height:1.2; color:var(--muted);
    transition:font-size .32s cubic-bezier(.3,.8,.35,1), color .32s ease;
  }
  .li-price-inline{
    font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted);
    flex-shrink:0; transition:opacity .25s ease;
  }
  .list-item.active .li-name{ font-size:29px; color:var(--text); }
  .list-item.active .li-price-inline{ opacity:0; }

  .li-detail{
    max-height:0; opacity:0; overflow:hidden;
    transition:max-height .32s ease, opacity .28s ease, margin .32s ease;
  }
  .list-item.active .li-detail{
    max-height:220px; opacity:1; margin-top:10px;
  }
  .li-desc{
    font-size:14.5px; color:var(--muted); line-height:1.5;
  }
  .li-foot{
    margin-top:14px; display:flex; align-items:center; gap:14px;
  }
  .li-price{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:20px; color:var(--gold);
  }
  .li-add{
    width:40px; height:40px; border-radius:50%;
    border:1px solid var(--sage); color:var(--sage); background:transparent;
    font-size:19px; display:flex; align-items:center; justify-content:center;
    transition:all .18s ease;
  }
  .li-add.added{ background:var(--sage); color:var(--bg); transform:scale(1.08); }

  .play-hint{
    font-family:'JetBrains Mono',monospace; font-size:16px; letter-spacing:1px;
    color:var(--muted); text-transform:uppercase; margin:0 18px 10px;
    display:flex; align-items:center; gap:7px;
  }
  .play-hint .dot{ width:7px; height:7px; border-radius:50%; background:var(--line); }
  .play-hint.playing .dot{ background:var(--gold); animation:pulse 1s ease-in-out infinite; }

  .group-tiles{
    display:grid; grid-template-columns:repeat(3, 1fr); gap:9px;
    padding:0 18px 16px;
  }
  .group-tile{
    aspect-ratio:1; border-radius:14px;
    background:var(--surface-2); border:2px solid var(--line);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px;
    transition:border-color .25s ease, box-shadow .25s ease, transform .15s ease;
  }
  .group-tile:active{ transform:scale(0.95); }
  .group-tile .gt-icon{ font-size:30px; }
  .group-tile .gt-label{
    font-size:12.5px; font-weight:600; text-align:center; line-height:1.25; color:var(--muted);
    padding:0 5px;
  }
  .group-tile.active{
    border-color:var(--gold);
    box-shadow:0 0 0 1px var(--gold), 0 0 16px -2px rgba(232,179,77,0.5);
  }
  .group-tile.active .gt-label{ color:var(--gold); }
  @keyframes pulse{ 0%,100%{opacity:1;} 50%{opacity:0.3;} }
  @media (min-width:640px){
    .group-tile .gt-icon{ font-size:38px; }
    .group-tile .gt-label{ font-size:14.5px; }
  }
  @media (max-width:360px){
    .group-tile .gt-icon{ font-size:24px; }
    .group-tile .gt-label{ font-size:11px; }
  }
  .nav-arrow:active{ transform:scale(0.92); }

  /* ---------- MINI PLAYER (cart) ---------- */
  .mini-player{
    position:fixed; right:16px; bottom:18px; z-index:50;
    width:52px; height:52px; border-radius:50%;
    background:var(--gold); border:none;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 10px 26px -8px rgba(232,179,77,0.6);
    transform:scale(0); opacity:0;
    transition:transform .35s cubic-bezier(.3,.9,.3,1.2), opacity .25s ease;
    cursor:pointer;
  }
  .mini-player.show{ transform:scale(1); opacity:1; }
  .mini-player .mp-icon{
    font-size:22px; font-weight:800; color:var(--bg); line-height:1;
  }
  .mini-player .badge{
    position:absolute; top:-4px; right:-4px;
    background:var(--bg); color:var(--gold); border:2px solid var(--gold);
    border-radius:999px; min-width:20px; height:20px; padding:0 5px;
    font-family:'JetBrains Mono',monospace; font-size:11px; font-weight:700;
    display:flex; align-items:center; justify-content:center;
  }

  /* ---------- CART REVIEW MODAL ---------- */
  .cart-backdrop{
    position:fixed; inset:0; z-index:80;
    background:rgba(8,6,11,0.6); backdrop-filter:blur(4px);
    opacity:0; pointer-events:none;
    transition:opacity .25s ease;
    display:flex; align-items:center; justify-content:center;
    padding:22px;
  }
  .cart-backdrop.open{ opacity:1; pointer-events:auto; }
  .cart-sheet{
    width:100%; max-width:380px; max-height:74vh;
    background:var(--surface); border:1px solid var(--line);
    border-radius:22px; padding:20px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,0.75);
    transform:scale(0.86) translateY(10px); opacity:0;
    transition:transform .28s cubic-bezier(.2,.85,.35,1.1), opacity .22s ease;
    display:flex; flex-direction:column;
  }
  .cart-backdrop.open .cart-sheet{ transform:scale(1) translateY(0); opacity:1; }
  .cart-head{
    display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;
  }
  .cart-head h3{
    font-family:'Instrument Serif',serif; font-style:italic; font-weight:400; font-size:22px;
  }
  .cart-close{
    width:32px; height:32px; border-radius:50%;
    background:var(--gold); border:none; color:var(--bg);
    display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700;
  }
  .cart-items{ overflow-y:auto; flex:1; }
  .cart-row{
    display:flex; align-items:center; justify-content:space-between; gap:10px;
    padding:10px 0; border-bottom:1px solid var(--line);
  }
  .cart-row .name{ font-size:13.5px; }
  .cart-row .qty-controls{
    display:flex; align-items:center; gap:8px;
    background:var(--surface-2); border:1px solid var(--line);
    border-radius:999px; padding:4px 6px;
  }
  .cart-row .qty-controls button{
    width:22px; height:22px; border-radius:50%; border:none; background:transparent;
    color:var(--text); font-size:14px; display:flex; align-items:center; justify-content:center;
  }
  .cart-row .qty-controls span{
    font-family:'JetBrains Mono',monospace; font-size:12px; min-width:14px; text-align:center;
  }
  .cart-row .row-price{
    font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--gold); flex-shrink:0; min-width:64px; text-align:right;
  }
  .cart-empty{
    text-align:center; color:var(--muted); font-size:13px; padding:30px 0;
  }
  .cart-foot{
    margin-top:14px; padding-top:14px; border-top:1px solid var(--line);
    display:flex; align-items:center; justify-content:space-between;
  }
  .cart-foot .grand-total{
    font-family:'JetBrains Mono',monospace; font-weight:700; font-size:18px; color:var(--gold);
  }

  @media (min-width:640px){
    .text-panel{ padding-left:34px; }
  }
  @media (prefers-reduced-motion: reduce){
    .vinyl{ animation:none !important; }
  }
</style>
</head>
<body>

<header class="top">
  <div class="brand-row">
    <div class="brand-left">
      <div class="brand">Do Re Mi</div>
      <button class="search-btn" id="searchToggle" aria-label="Поиск">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      </button>
    </div>
    <div class="track-pos" id="trackPos">01 / 17</div>
  </div>
  <div class="search-wrap" id="searchWrap">
    <input type="text" id="searchInput" placeholder="Найти блюдо или напиток…" autocomplete="off">
  </div>
</header>
<div class="cat-tabs" id="catTabs"></div>

<div class="search-results-overlay" id="searchResultsOverlay">
  <div class="search-results-list" id="searchResultsList"></div>
</div>

<div class="app">
  <div class="disc-stage">
    <div class="vinyl-wrap" id="vinylWrap">
      <div class="vinyl" id="vinyl">
        <div class="texture"></div>
        <div class="ring"></div>
        <div class="center-dot"></div>
      </div>
      <div class="static-plate" id="staticPlate">
        <div class="plate-spin" id="plateSpin">
          <div class="icon" id="discIcon">🥒</div>
          <img id="discPhoto" src="" alt="">
        </div>
      </div>
      <div class="tonearm" id="tonearm">
        <svg viewBox="0 0 100 100">
          <circle cx="88" cy="10" r="8" fill="#3a3145" stroke="#5b5266" stroke-width="2"/>
          <path d="M88 10 L22 58" stroke="#5b5266" stroke-width="5" stroke-linecap="round" fill="none"/>
          <circle cx="22" cy="58" r="5" fill="var(--gold)"/>
        </svg>
      </div>
    </div>
  </div>

  <div class="text-panel" id="textPanel">
    <div class="play-hint" id="playHint"><span class="dot"></span><span>Нажмите на тарелку — играет активное блюдо</span></div>
    <div class="group-tiles" id="groupTiles"></div>
    <div class="list-scroll" id="listScroll"></div>
  </div>
</div>

<button class="panel-toggle" id="panelToggle">‹</button>

<div class="mini-player" id="miniPlayer">
  <span class="mp-icon">🛒</span>
  <span class="badge" id="cartCount">0</span>
</div>

<div class="cart-backdrop" id="cartBackdrop">
  <div class="cart-sheet">
    <div class="cart-head">
      <h3>Ваш заказ</h3>
      <button class="cart-close" id="cartClose">✕</button>
    </div>
    <div class="cart-items" id="cartItems"></div>
    <div class="cart-foot">
      <span>Итого</span>
      <span class="grand-total" id="grandTotal">0 ₸</span>
    </div>
  </div>
</div>

<script>
const MENU = [
  { cat:"Холодные закуски", icon:"🥒", bg:"#2B2135", group:"food", items:[
    {n:"Домашние разносолы", d:"Маринованные помидоры черри, солёные огурцы, шампиньоны, квашеная капуста, лимон, зелень", p:2900, photo:"domashnie_raznosoly.png"},
    {n:"Кавказская закуска", d:"Брынза, огурцы, помидоры, перец светофор, зелень в ассортименте", p:3900, photo:"kavkazskaya_zakuska.png"},
    {n:"Мясное плато", d:"Казы, языкь, жая, индейка, маслины, помидоры", p:9900, photo:"myasnoe_plato.png"},
    {n:"Рыбное ассорти", d:"Балык, осетрина копчёная, сёмга копчёная, лимон, маслины", p:7800, photo:"rybnoe_assorti.png", noCrop:true},
    {n:"Русская закуска", d:"Огурцы, отварной картофель, квашеная капуста, солёные огурцы, лук репчатый, лимон", p:3100, photo:"russkaya_zakuska.png"},
    {n:"Сырное плато", d:"Сыр в ассортименте, мёд, виноград, грецкий орех", p:6900, photo:"syrnoe_plato.png"},
  ]},
  { cat:"Горячие закуски", icon:"🍤", bg:"#31243D", group:"food", items:[
    {n:"Жареные креветки", d:"Обжаренные тигровые креветки на сковороде", p:3700, photo:"zharenye_krevetki.png"},
    {n:"Крылышки в медово-горчичном соусе", d:"Куриные крылышки, карамелизованные в соусе", p:3800, photo:"krylyshki_v_medovo_gorchichnom_souse.png"},
    {n:"Тигровые креветки в темпуре", d:"Хрустящая панировка, соус свит чили", p:3600, photo:"tigrovye_krevetki_v_tempure.png"},
    {n:"Чесночные гарлики с сырным соусом", d:"Хрустящие гренки с чесноком и сырным соусом", p:1500, photo:"chesnochnye_garliki_s_syrnym_sousom.png"},
    {n:"Куриные наггетсы с соусом тар-тар", d:"Хрустящие наггетсы из курицы, соус тар-тар", p:2100, photo:"kurinye_naggetsy_s_sousom_tar_tar.png"},
    {n:"Сырные палочки с соусом тар-тар", d:"Хрустящие сырные палочки в панировке, соус тар-тар", p:1900, photo:"syrnye_palochki_s_sousom_tar_tar.png"},
    {n:"Мини чебуречки", d:"Мини чебуреки с мясной начинкой", p:2800, photo:"mini_cheburechki.png"},

let flat = [];
MENU.forEach((cat)=> cat.items.forEach(it=> flat.push({...it, cat:cat.cat, icon:cat.icon, bg:cat.bg})));

let activeIdx = 0;
let playing = false;

const catTabs = document.getElementById('catTabs');
const trackPos = document.getElementById('trackPos');
const listScroll = document.getElementById('listScroll');
const vinyl = document.getElementById('vinyl');
const tonearm = document.getElementById('tonearm');
const discIcon = document.getElementById('discIcon');
const discPhoto = document.getElementById('discPhoto');
const staticPlate = document.getElementById('staticPlate');
const plateSpin = document.getElementById('plateSpin');
const playHint = document.getElementById('playHint');

/* build category tabs */
MENU.forEach((cat)=>{
  const btn = document.createElement('button');
  btn.textContent = cat.cat;
  btn.dataset.cat = cat.cat;
  btn.addEventListener('click', ()=>{
    document.querySelector(`.cat-divider[data-cat="${cat.cat}"]`)?.scrollIntoView({behavior:'smooth', block:'start'});
  });
  catTabs.appendChild(btn);
});

/* build scrollable list */
/* top-level group tiles (Основное меню / Барное меню / Crazy menu / Кальянное меню / Акции) */
const GROUPS = [
  { key:"food", label:"Основное меню", icon:"🍽️" },
  { key:"bar", label:"Барное меню", icon:"🍸" },
  { key:"crazy", label:"Crazy menu", icon:"🎤" },
  { key:"hookah", label:"Кальянное меню", icon:"💨" },
  { key:"promo", label:"Акции", icon:"🎉" },
];
const groupTiles = document.getElementById('groupTiles');
GROUPS.forEach(g=>{
  const tile = document.createElement('button');
  tile.className = 'group-tile';
  tile.dataset.group = g.key;
  tile.innerHTML = `<div class="gt-icon">${g.icon}</div><div class="gt-label">${g.label}</div>`;
  tile.addEventListener('click', ()=>{
    const firstCat = MENU.find(c => c.group === g.key);
    if(!firstCat) return;
    const idx = flat.findIndex(d => d.cat === firstCat.cat);
    if(idx < 0) return;
    const el = document.querySelector(`.list-item[data-idx="${idx}"]`);
    el?.scrollIntoView({behavior:'smooth', block:'center'});
    setActive(idx);
  });
  groupTiles.appendChild(tile);
});

let flatIdx = 0;
MENU.forEach((cat)=>{
  const divider = document.createElement('div');
  divider.className = 'cat-divider';
  divider.dataset.cat = cat.cat;
  divider.textContent = cat.cat;
  listScroll.appendChild(divider);

  cat.items.forEach((it)=>{
    const i = flatIdx++;
    const el = document.createElement('div');
    el.className = 'list-item';
    el.dataset.idx = i;
    el.innerHTML = `
      <div class="row-compact">
        <div class="li-name">${it.n}</div>
        <div class="li-price-inline">${it.p.toLocaleString('ru-RU')} ₸</div>
      </div>
      <div class="li-detail">
        <div class="li-desc">${it.d}</div>
        <div class="li-foot">
          <div class="li-price">${it.p.toLocaleString('ru-RU')} ₸</div>
          <button class="li-add" data-idx="${i}" data-price="${it.p}">+</button>
        </div>
      </div>
    `;
    listScroll.appendChild(el);
  });
});

const items = [...listScroll.querySelectorAll('.list-item')];

let photoRequestToken = 0;
function applyPlatePhoto(d){
  const myToken = ++photoRequestToken;
  staticPlate.classList.remove('loading');
  if(!d.photo){
    discPhoto.src = '';
    staticPlate.classList.remove('has-photo','no-crop');
    return;
  }
  staticPlate.classList.add('loading');
  const test = new Image();
  test.onload = () => {
    if(myToken !== photoRequestToken) return; // a newer dish was selected meanwhile
    staticPlate.classList.remove('loading');
    discPhoto.src = d.photo;
    staticPlate.classList.add('has-photo');
    staticPlate.classList.toggle('no-crop', !!d.noCrop);
  };
  test.onerror = () => {
    if(myToken !== photoRequestToken) return;
    staticPlate.classList.remove('loading');
    discPhoto.src = '';
    staticPlate.classList.remove('has-photo','no-crop');
  };
  test.src = d.photo;
}

function setActive(i){
  if(i===activeIdx && items[i].classList.contains('active')) return;
  activeIdx = i;
  const d = flat[i];
  items.forEach(el=> el.classList.toggle('active', Number(el.dataset.idx)===i));
  discIcon.textContent = d.icon;
  applyPlatePhoto(d);
  vinyl.style.background = d.bg;
  vinyl.classList.add('active');
  vinyl.classList.toggle('playing', playing);
  tonearm.classList.toggle('playing', playing);
  plateSpin.classList.toggle('spinning', playing);
  playHint.classList.toggle('playing', playing);
  playHint.querySelector('span:last-child').textContent = playing ? 'Играет: ' + d.n : 'Нажмите на тарелку — играет активное блюдо';
  trackPos.textContent = String(i+1).padStart(2,'0')+' / '+flat.length;
  [...catTabs.children].forEach(b=> b.classList.toggle('active', b.dataset.cat===d.cat));
  const dCat = MENU.find(c => c.cat === d.cat);
  const dGroup = dCat ? dCat.group : null;
  [...groupTiles.children].forEach(t => t.classList.toggle('active', t.dataset.group === dGroup));
}

let lastChangeTime = 0;
let ticking = false;

function findClosestAndActivate(){
  ticking = false;
  const rect = listScroll.getBoundingClientRect();
  const centerY = rect.top + rect.height/2;
  let closest = null, minDist = Infinity;
  items.forEach(el=>{
    const r = el.getBoundingClientRect();
    const c = r.top + r.height/2;
    const dist = Math.abs(c - centerY);
    if(dist < minDist){ minDist = dist; closest = el; }
  });
  if(closest){
    const i = Number(closest.dataset.idx);
    // lock briefly after a change so the expand/collapse animation
    // doesn't itself shift layout enough to re-trigger a switch mid-transition
    if(i !== activeIdx && (Date.now() - lastChangeTime) > 260){
      setActive(i);
      lastChangeTime = Date.now();
    }
  }
}

listScroll.addEventListener('scroll', ()=>{
  if(!ticking){ ticking = true; requestAnimationFrame(findClosestAndActivate); }
}, {passive:true});
window.addEventListener('resize', findClosestAndActivate);

setActive(0);
requestAnimationFrame(findClosestAndActivate);

document.getElementById('vinylWrap').addEventListener('click', ()=>{
  playing = !playing;
  const d = flat[activeIdx];
  vinyl.classList.toggle('playing', playing);
  tonearm.classList.toggle('playing', playing);
  plateSpin.classList.toggle('spinning', playing);
  playHint.classList.toggle('playing', playing);
  playHint.querySelector('span:last-child').textContent = playing ? 'Играет: ' + d.n : 'Нажмите на тарелку — играет активное блюдо';
});

const textPanel = document.getElementById('textPanel');
const panelToggle = document.getElementById('panelToggle');
let panelCollapsed = false;
panelToggle.addEventListener('click', ()=>{
  panelCollapsed = !panelCollapsed;
  textPanel.classList.toggle('collapsed', panelCollapsed);
  panelToggle.textContent = panelCollapsed ? '›' : '‹';
});

/* ---------- SEARCH ---------- */
const searchToggle = document.getElementById('searchToggle');
const searchWrap = document.getElementById('searchWrap');
const searchInput = document.getElementById('searchInput');
const searchResultsOverlay = document.getElementById('searchResultsOverlay');
const searchResultsList = document.getElementById('searchResultsList');

searchToggle.addEventListener('click', ()=>{
  const open = searchWrap.classList.toggle('open');
  searchToggle.classList.toggle('active', open);
  if(open){
    setTimeout(()=>searchInput.focus(), 150);
  } else {
    searchInput.value = '';
    searchResultsOverlay.classList.remove('open');
  }
});

searchInput.addEventListener('input', ()=>{
  const q = searchInput.value.trim().toLowerCase();
  if(!q){
    searchResultsOverlay.classList.remove('open');
    return;
  }
  searchResultsOverlay.classList.add('open');
  const hits = flat
    .map((d, idx) => ({...d, idx}))
    .filter(d => d.n.toLowerCase().includes(q));
  if(hits.length === 0){
    searchResultsList.innerHTML = '<div class="search-empty">Ничего не нашлось</div>';
    return;
  }
  searchResultsList.innerHTML = hits.map(d => `
    <div class="search-hit" data-id="${d.idx}">
      <div>
        <span class="shc">${d.cat}</span>
        <span class="shn">${d.n}</span>
      </div>
      <div class="shp">${d.p.toLocaleString('ru-RU')} ₸</div>
    </div>
  `).join('');
});

searchResultsList.addEventListener('click', (e)=>{
  const hit = e.target.closest('.search-hit');
  if(!hit) return;
  const idx = hit.dataset.id;
  const el = document.querySelector(`.list-item[data-idx="${idx}"]`);
  searchResultsOverlay.classList.remove('open');
  searchWrap.classList.remove('open');
  searchToggle.classList.remove('active');
  searchInput.value = '';
  el?.scrollIntoView({behavior:'smooth', block:'center'});
});

let cart = {};
const miniPlayer = document.getElementById('miniPlayer');
const cartCount = document.getElementById('cartCount');
const cartBackdrop = document.getElementById('cartBackdrop');
const cartItemsEl = document.getElementById('cartItems');
const grandTotal = document.getElementById('grandTotal');

function updateCartUI(){
  const count = Object.values(cart).reduce((a,c)=>a+c,0);
  cartCount.textContent = count;
  miniPlayer.classList.toggle('show', count>0);
  renderCartModal();
}

function renderCartModal(){
  const entries = Object.entries(cart).filter(([,qty])=>qty>0);
  if(entries.length===0){
    cartItemsEl.innerHTML = '<div class="cart-empty">Пока пусто — добавьте что-нибудь из меню</div>';
    grandTotal.textContent = '0 ₸';
    return;
  }
  let total = 0;
  cartItemsEl.innerHTML = entries.map(([idx,qty])=>{
    const d = flat[idx];
    total += d.p*qty;
    return `
      <div class="cart-row" data-idx="${idx}">
        <div class="name">${d.n}</div>
        <div class="qty-controls">
          <button class="cart-minus" data-idx="${idx}">−</button>
          <span>${qty}</span>
          <button class="cart-plus" data-idx="${idx}">+</button>
        </div>
        <div class="row-price">${(d.p*qty).toLocaleString('ru-RU')} ₸</div>
      </div>`;
  }).join('');
  grandTotal.textContent = total.toLocaleString('ru-RU')+' ₸';
}

function addToCart(idx){
  cart[idx] = (cart[idx]||0)+1;
  updateCartUI();
}

listScroll.addEventListener('click', (e)=>{
  const b = e.target.closest('.li-add');
  if(b){
    e.stopPropagation();
    addToCart(b.dataset.idx);
    b.classList.add('added');
    setTimeout(()=>b.classList.remove('added'),280);
    return;
  }
  const item = e.target.closest('.list-item');
  if(item && Number(item.dataset.idx) !== activeIdx){
    item.scrollIntoView({behavior:'smooth', block:'center'});
  }
});

/* open / close cart review */
function openCart(){ renderCartModal(); cartBackdrop.classList.add('open'); }
function closeCart(){ cartBackdrop.classList.remove('open'); }
miniPlayer.addEventListener('click', openCart);
document.getElementById('cartClose').addEventListener('click', closeCart);
cartBackdrop.addEventListener('click', (e)=>{ if(e.target===cartBackdrop) closeCart(); });

cartItemsEl.addEventListener('click', (e)=>{
  const plus = e.target.closest('.cart-plus');
  const minus = e.target.closest('.cart-minus');
  if(plus){ const i = plus.dataset.idx; cart[i] = (cart[i]||0)+1; updateCartUI(); }
  if(minus){
    const i = minus.dataset.idx;
    cart[i] = (cart[i]||0)-1;
    if(cart[i]<=0) delete cart[i];
    updateCartUI();
  }
});
</script>
